name: Transity CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC
            os: windows-latest
            compiler: msvc
            build-type: Release
          - name: Windows MSVC Debug
            os: windows-latest
            compiler: msvc
            build-type: Debug
          - name: Ubuntu GCC
            os: ubuntu-latest
            compiler: gcc
            build-type: Release
          - name: Ubuntu GCC Debug
            os: ubuntu-latest
            compiler: gcc
            build-type: Debug
          - name: macOS Clang
            os: macos-latest
            compiler: clang
            build-type: Release

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake ninja-build curl zip unzip tar pkg-config \
          libx11-dev libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
          libgl1-mesa-dev xorg-dev xvfb

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install cmake ninja curl pkg-config

    - name: Cache vcpkg
      uses: actions/cache@v3
      with:
        path: |
          ${{ github.workspace }}/vcpkg
          ${{ github.workspace }}/build/vcpkg_installed
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-

    - name: Bootstrap vcpkg
      shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        if ("${{ runner.os }}" -eq "Windows") {
          ./vcpkg/bootstrap-vcpkg.bat
          ./vcpkg/vcpkg integrate install
        } else {
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg integrate install
        }

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Configure CMake (Unix)
      if: runner.os != 'Windows'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build
      run: |
        cmake --build build --config ${{ matrix.build-type }} --parallel

    - name: Run Tests
      working-directory: ${{ github.workspace }}/build
      env:
        CI: true
        CTEST_OUTPUT_ON_FAILURE: 1
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Linux" ]; then
          xvfb-run --auto-servernum --server-args="-screen 0 800x600x24" ctest -V -C ${{ matrix.build-type }}
        else
          ctest -V -C ${{ matrix.build-type }}
        fi

    - name: Run Static Analysis
      if: matrix.build-type == 'Release' && runner.os == 'Linux'
      run: |
        # Add static analysis commands here once codebase has them configured
        echo "Static analysis step will be implemented in the future"

    - name: Check Format
      if: runner.os == 'Linux'
      run: |
        # Add format checking commands here once codebase has clang-format configured
        echo "Format checking will be implemented in the future"
        
  code-coverage:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Cache vcpkg
      uses: actions/cache@v3
      with:
        path: |
          ${{ github.workspace }}/vcpkg
          ${{ github.workspace }}/build/vcpkg_installed
        key: vcpkg-ubuntu-coverage-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-ubuntu-coverage-

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake ninja-build lcov curl zip unzip tar pkg-config

    - name: Bootstrap vcpkg
      shell: bash
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg integrate install
        
    - name: Configure CMake with Coverage
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
        
    - name: Build
      run: |
        cmake --build build --config Debug --parallel
        
    - name: Run Tests with Coverage
      working-directory: ${{ github.workspace }}/build
      env:
        CI: true
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 800x600x24" ctest -C Debug --output-on-failure
        
    - name: Generate Coverage Report
      run: |
        lcov --directory build --capture --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        lcov --list coverage.info
        
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v2
      with:
        files: ./coverage.info
        fail_ci_if_error: false 